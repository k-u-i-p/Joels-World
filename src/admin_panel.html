<h3>Edit Building</h3>
<div style="text-align:center; margin-bottom:10px;">
  <input type="text" id="building-name-input" style="width:100%; box-sizing:border-box; padding:5px; text-align:center; background:rgba(255,255,255,0.1); border:1px solid #7f8c8d; color:white; border-radius:4px;" placeholder="Building Name" />
</div>
<div class="control-row">
  <span>Rotate:</span>
  <button id="btn-rot-left">↺</button>
  <button id="btn-rot-right">↻</button>
</div>
<div class="control-row">
  <span>Width:</span>
  <button id="btn-width-dec">-</button>
  <button id="btn-width-inc">+</button>
</div>
<div class="control-row">
  <span>Height:</span>
  <button id="btn-height-dec">-</button>
  <button id="btn-height-inc">+</button>
</div>
